        [data-theme="dark"] {

            --primary-color: #375a7f;
            --primary-hover: #2b4764;

        }

        body {

            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
